<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2d2d2d">
    <title>مسبحة صفاء الروح | sabriFX</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-dark: #2d2d2d;
            --primary-darker: #1a1a1a;
            --accent-gold: #f4d03f;
            --accent-gold-light: #ffd700;
            --card-bg: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        * {
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
            width: 100%;
            overflow-x: hidden;
            color: var(--text-primary);
        }

        .header-bg {
            background: linear-gradient(135deg, rgba(45, 45, 45, 0.98), rgba(26, 26, 26, 0.95));
            height: 140px; width: 100%;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
            position: relative; display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border-bottom: 2px solid var(--accent-gold);
        }
        .header-title { 
            color: var(--accent-gold); 
            font-weight: 900;             font-size: 1.4rem;
            text-shadow: 0 2px 8px rgba(244, 208, 63, 0.3);
        }

        .tasbeeh-card {
            margin-top: 35px; 
            width: 92%; 
            max-width: 380px;
            background: var(--card-bg); 
            padding: 25px 20px;
            border-radius: 25px; 
            box-shadow: var(--shadow);
            text-align: center; 
            border: 1px solid rgba(244, 208, 63, 0.2);
        }

        .zikr-selector {
            width: 100%; 
            padding: 14px; 
            background-color: rgba(255,255,255,0.05);
            border: 2px solid rgba(244, 208, 63, 0.3); 
            border-radius: 15px;
            color: var(--text-primary); 
            font-family: 'Tajawal', sans-serif;
            font-weight: 800; 
            margin-bottom: 20px; 
            outline: none; 
            cursor: pointer;
            text-align: center; 
            font-size: 1rem;
            -webkit-appearance: none; 
            appearance: none;
        }
        .zikr-selector option {
            background: var(--primary-dark);
            color: var(--text-primary);
        }

        .counter-display {
            font-size: 4.5rem; 
            font-weight: 900; 
            color: var(--accent-gold);
            margin: 15px 0; 
            font-family: sans-serif;
            user-select: none; 
            line-height: 1;
        }

        .current-zikr {
            font-size: 1.1rem;            color: var(--text-secondary);
            margin-bottom: 20px;
            font-weight: 700;
        }

        .tap-zone {
            width: 150px; 
            height: 150px; 
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-darker));
            border-radius: 50%; 
            margin: 20px auto;
            display: flex; 
            justify-content: center; 
            align-items: center;
            cursor: pointer; 
            position: relative;
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
            border: 3px solid var(--accent-gold);
            transition: transform 0.08s;
        }
        .tap-zone:active {
            transform: scale(0.96);
            border-color: var(--accent-gold-light);
        }
        .tap-zone i { 
            font-size: 2.8rem; 
            color: var(--accent-gold); 
            pointer-events: none;
        }
        .tap-label {
            position: absolute; 
            bottom: 28px;
            font-weight: 700; 
            color: var(--accent-gold); 
            font-size: 0.85rem;
            pointer-events: none;
        }

        .btn-reset {
            background: rgba(244, 208, 63, 0.1); 
            border: 2px solid var(--accent-gold);
            color: var(--accent-gold); 
            padding: 12px 30px; 
            border-radius: 25px;
            font-weight: 800; 
            font-size: 0.95rem; 
            cursor: pointer;
            margin-top: 15px; 
            transition: all 0.3s;
            font-family: 'Tajawal', sans-serif;            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-reset:active { 
            background: var(--accent-gold); 
            color: var(--primary-darker);
            transform: scale(0.98);
        }

        .footer-brand {
            margin-top: auto; 
            padding: 20px;
            font-size: 0.8rem; 
            color: var(--text-secondary); 
            text-align: center;
        }
        .footer-brand span { 
            color: var(--accent-gold); 
            font-weight: 900; 
        }

        .save-indicator {
            position: fixed; 
            top: 20px; 
            right: 20px;
            background: rgba(46, 204, 113, 0.95);
            color: white; 
            padding: 8px 16px; 
            border-radius: 20px;
            font-size: 0.8rem; 
            font-weight: 700;
            z-index: 1000; 
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .save-indicator.show { opacity: 1; }

        .notification {
            position: fixed; 
            top: 20px; 
            left: 50%; 
            transform: translateX(-50%) translateY(-100px);
            background: var(--card-bg); 
            padding: 15px 25px; 
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);            border: 2px solid var(--accent-gold);
            z-index: 2000; 
            font-weight: 700; 
            color: var(--text-primary);
            transition: transform 0.4s; 
            max-width: 90%;
        }
        .notification.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="save-indicator" id="saveIndicator">
    <i class="fas fa-check"></i> <span>تم الحفظ</span>
</div>

<div class="notification" id="notification"></div>

<div class="header-bg">
    <div class="header-title">✨ المسبحة الإلكترونية ✨</div>
</div>

<div class="tasbeeh-card">
    <select class="zikr-selector" id="zikrList">
        <option value="1">استغفر الله</option>
        <option value="2">سبحان الله</option>
        <option value="3">الحمد لله</option>
        <option value="4">لا إله إلا الله</option>
        <option value="5">الله أكبر</option>
        <option value="6">لا حول ولا قوة إلا بالله</option>
        <option value="7">الصلاة على النبي ﷺ</option>
        <option value="8">سبحان الله وبحمده</option>
        <option value="9">سبحان الله العظيم</option>
        <option value="10">لا إله إلا أنت سبحانك</option>
    </select>

    <div class="current-zikr" id="currentZikr">استغفر الله</div>
    <div class="counter-display" id="counter">0</div>

    <div class="tap-zone" id="tapZone">
        <i class="fas fa-fingerprint"></i>
        <div class="tap-label">اضغط للعد</div>
    </div>

    <button type="button" class="btn-reset" id="resetBtn">
        <i class="fas fa-undo"></i> تصفير العداد
    </button>
</div>

<footer class="footer-brand">تطبيق <span>صفاء الروح</span> | sabriFX</footer>
<script>
    // 🔑 مفتاح التخزين الموحد
    const STORAGE_KEY = 'sabriFX_tasbeeh_v2';
    
    // 📦 عناصر DOM
    const selector = document.getElementById('zikrList');
    const display = document.getElementById('counter');
    const tapZone = document.getElementById('tapZone');
    const currentZikrText = document.getElementById('currentZikr');
    const resetBtn = document.getElementById('resetBtn');
    const saveIndicator = document.getElementById('saveIndicator');
    const notification = document.getElementById('notification');

    // 📜 قائمة الأذكار
    const zikrNames = {
        "1": "استغفر الله", "2": "سبحان الله", "3": "الحمد لله",
        "4": "لا إله إلا الله", "5": "الله أكبر", "6": "لا حول ولا قوة إلا بالله",
        "7": "الصلاة على النبي ﷺ", "8": "سبحان الله وبحمده", "9": "سبحان الله العظيم",
        "10": "لا إله إلا أنت سبحانك"
    };

    let counters = {};
    let saveTimeout = null;

    // 💾 تحميل البيانات عند البدء
    function loadData() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                const parsed = JSON.parse(saved);
                for (let key in parsed) {
                    if (counters.hasOwnProperty(key)) counters[key] = parseInt(parsed[key]) || 0;
                }
            }
        } catch (e) { console.error('Load Error:', e); }
        updateDisplay();
    }

    // 💾 حفظ البيانات (مؤجل 400ms لتجنب الكتابة المتكررة)
    function scheduleSave() {
        if (saveTimeout) clearTimeout(saveTimeout);
        saveTimeout = setTimeout(() => {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(counters));
                showSaveIndicator();
            } catch (e) { console.error('Save Error:', e); }
        }, 400);
    }
    // ️ تحديث الواجهة
    function updateDisplay() {
        const id = selector.value;
        display.textContent = counters[id] || 0;
        currentZikrText.textContent = zikrNames[id];
    }

    // 🔔 إشعار مؤقت
    function showNotification(msg) {
        notification.textContent = msg;
        notification.classList.add('show');
        setTimeout(() => notification.classList.remove('show'), 2500);
    }

    function showSaveIndicator() {
        saveIndicator.classList.add('show');
        setTimeout(() => saveIndicator.classList.remove('show'), 1200);
    }

    // 👆 معالجة النقر على منطقة التسبيح
    function handleTap(e) {
        e.preventDefault();
        e.stopPropagation();
        
        const now = Date.now();
        if (now - lastTapTime < 50) return; // منع النقر المزدوج السريع
        lastTapTime = now;

        const id = selector.value;
        counters[id] = (counters[id] || 0) + 1;
        display.textContent = counters[id];

        if (navigator.vibrate) navigator.vibrate(15);
        scheduleSave();
    }

    // 🔄 زر التصفير (مضمون ومستقل)
    function handleReset(e) {
        if(e) { e.preventDefault(); e.stopPropagation(); }
        
        const id = selector.value;
        const currentVal = counters[id] || 0;
        
        if (currentVal === 0) {
            showNotification('العداد على الصفر بالفعل');
            return;
        }

        if (confirm(`هل تريد تصفير عداد "${zikrNames[id]}"؟\nالعدد الحالي: ${currentVal}`)) {
            // 1. تعيين الصفر            counters[id] = 0;
            
            // 2. تحديث العرض فوراً
            display.textContent = '0';
            
            // 3. حفظ فوري ومباشر في الذاكرة (يتجاوز المؤقت)
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(counters));
            } catch(e) {}
            
            showSaveIndicator();
            showNotification('✅ تم تصفير العداد بنجاح');
        }
    }

    let lastTapTime = 0;

    // 🚀 تهيئة التطبيق
    function init() {
        loadData();
        
        // ربط منطقة اللمس
        tapZone.addEventListener('touchstart', handleTap, { passive: false });
        tapZone.addEventListener('mousedown', handleTap);
        tapZone.addEventListener('click', e => e.preventDefault());

        // ربط زر التصفير مباشرة
        resetBtn.addEventListener('click', handleReset);
        resetBtn.addEventListener('touchend', handleReset);

        // تغيير الذكر
        selector.addEventListener('change', updateDisplay);
    }

    // حفظ عند إغلاق التطبيق
    window.addEventListener('beforeunload', () => {
        if (saveTimeout) clearTimeout(saveTimeout);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(counters)); } catch(e){}
    });

    window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
